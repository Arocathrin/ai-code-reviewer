<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeLens — Intelligent Code Reviewer</title>

  <!-- Fonts: JetBrains Mono for code/data, Inter for UI -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- highlight.js for syntax highlighting -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <!-- marked.js to render markdown (used for the summary/explanation text) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-shell">

    <!-- Terminal-style header bar: the "signature element" -->
    <header class="titlebar">
      <div class="titlebar-dots">
        <span class="dot dot-red"></span>
        <span class="dot dot-yellow"></span>
        <span class="dot dot-green"></span>
      </div>
      <div class="titlebar-path">
        <span class="brand-mark">&lt;/&gt;</span>
        <span class="brand-name">CodeLens</span>
        <span class="titlebar-sep">—</span>
        <span class="titlebar-file" id="titlebarFile">untitled.py</span>
      </div>
      <div class="titlebar-status" id="titlebarStatus">
        <span class="status-dot idle"></span>
        <span class="status-text">idle</span>
      </div>
    </header>

    <main class="workspace">

      <!-- LEFT: Input panel -->
      <section class="panel input-panel">
        <div class="panel-head">
          <h2>Source</h2>
          <select id="languageSelect" aria-label="Select language">
            <option value="auto-detect">Auto-detect</option>
            <option value="python">Python</option>
            <option value="javascript">JavaScript</option>
            <option value="java">Java</option>
          </select>
        </div>

        <textarea
          id="codeInput"
          class="code-editor"
          placeholder="Paste your code here, or drop a .py / .js / .java file..."
          spellcheck="false"
        ></textarea>

        <div class="panel-foot">
          <label class="file-drop" for="fileInput">
            <input type="file" id="fileInput" accept=".py,.js,.java" hidden>
            Upload file
          </label>
          <button id="analyzeBtn" class="btn-primary">
            <span class="btn-label">Analyze code</span>
            <span class="btn-spinner" hidden></span>
          </button>
        </div>
      </section>

      <!-- RIGHT: Results panel -->
      <section class="panel results-panel">
        <div id="emptyState" class="empty-state">
          <div class="empty-glyph">&#123;&#125;</div>
          <p>Run an analysis to see the bug report and optimized code here.</p>
        </div>

        <div id="errorState" class="error-state" hidden></div>

        <div id="resultsContent" class="results-content" hidden>

          <div class="result-block" id="summaryBlock">
            <div class="block-label">
              <span class="label-icon">&#9678;</span> Plain-language explanation
            </div>
            <div class="block-body prose" id="summaryText"></div>
          </div>

          <div class="result-block" id="statsBlock">
            <div class="block-label">
              <span class="label-icon">&#128203;</span> Code statistics
            </div>
            <div class="block-body" id="statsGrid"></div>
          </div>

          <div class="result-block" id="bugsBlock">
            <div class="block-label">
              <span class="label-icon">&#9888;</span> Bug report
              <span class="badge" id="bugCount">0</span>
            </div>
            <div class="block-body" id="bugsList"></div>
          </div>

          <div class="result-block" id="complexityBlock">
            <div class="block-label">
              <span class="label-icon">&#128200;</span> Complexity analysis
            </div>
            <div class="block-body" id="complexityList"></div>
          </div>

          <div class="result-block" id="suggestionsBlock">
            <div class="block-label">
              <span class="label-icon">&#10022;</span> Suggestions
            </div>
            <div class="block-body" id="suggestionsList"></div>
          </div>

          <div class="result-block" id="optimizedBlock">
            <div class="block-label">
              <span class="label-icon">&#10003;</span> Optimized code
              <button class="copy-btn" id="copyBtn">Copy</button>
            </div>
            <div class="block-body" id="optimizedCode"></div>
          </div>

        </div>
      </section>

    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
